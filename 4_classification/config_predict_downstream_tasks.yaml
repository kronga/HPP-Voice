# ---------- 1.  Paths & storage ------------------------------------------------
PATH_FOR_MEDICAL_CONDITIONS: "/net/mraid20/export/jafar/Sarah/csv_files/"
RealDeepFolderPath: "/net/mraid20/export/genie/LabData/Analyses/DeepVoiceFolder"
DeepFolderPath: "/net/mraid20/export/genie/LabData/Analyses/DeepVoiceFolder/with_Pretrained"
MEDICAL_FILE_PATH: "/net/mraid20/export/genie/LabData/Analyses/DeepVoiceFolder/nastya_medical_conditions_consolidated_combined_above1percent.csv"
OUTPUT_PATH: "/net/mraid20/export/genie/LabData/Analyses/DeepVoiceFolder/predictions_Dec2024_rerun"
OPTUNA_JOURNAL_PATH: "/net/mraid20/export/genie/LabData/Analyses/DeepVoiceFolder/predictions_Dec2024_rerun/optuna_journal_storage.log"    # replaces hard-coded JournalFileBackend path

LOG_DIR: "/net/mraid20/export/genie/LabData/Analyses/DeepVoiceFolder/predictions_Dec2024_rerun/logs"   # LOG_FILE is timestamp-dependent → compute in code

VOICE_PREDICTIONS_CSV: "/net/mraid20/export/genie/LabData/Analyses/DeepVoiceFolder/all_predictions_good_vs_technical_issues_Dec24.csv"
VOICE_PROB_THRESHOLD: 0.5

# ---------- 2.  Core run parameters -------------------------------------------
SEED: 5
NUM_THREAD: 1
NUM_TRIALS: 10
WORKERS_FACTOR: 3
MODEL_TYPE: "lightgbm"      # "lightgbm" | "xgboost" | "logistic regression"
N_SPLITS: 4
BALANCE_CLASSES: true
COMBINE_WITH_BASELINE: true
GENDER_SPECIFIC: true
DEBUG_MODE: false
FORCE_NEW_STUDIES: false

# ---------- 3.  Execution-phase toggles ---------------------------------------
RUN_HPO_PHASE:   false
RUN_CV_PHASE:    false
RUN_TEST_PHASE:  true
LOAD_HPO_RESULTS: true

